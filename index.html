<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Modern</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Container */
.kalkulator{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    padding:25px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    width:300px;
}

/* Layar */
#layar{
    width:100%;
    height:70px;
    font-size:32px;
    text-align:right;
    padding:10px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#111;
    color:#00ffcc;
    margin-bottom:20px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

/* Grid tombol */
.tombol-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:14px;
}

/* Tombol */
button{
    height:65px;
    font-size:20px;
    border:none;
    border-radius:14px;
    background:#2f2f2f;
    color:white;
    cursor:pointer;
    box-shadow:0 6px 12px rgba(0,0,0,0.4);
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

button:active{
    transform:scale(0.95);
}

/* Operator */
.operator{
    background:#ff8800;
}

/* Clear */
.hapus{
    background:linear-gradient(90deg,#7f8c8d,#a3a75c);
}

/* Sama dengan */
.sama-dengan{
    grid-column: span 2;
    background:#ff3b3b;
}

</style>
</head>

<body>

<div class="kalkulator">

<input type="text" id="layar" placeholder="0" readonly>

<div class="tombol-grid">

<button class="hapus" onclick="hapusLayar()">C</button>
<button class="operator" onclick="masukkanAngka('/')">÷</button>
<button class="operator" onclick="masukkanAngka('*')">×</button>
<button class="operator" onclick="masukkanAngka('-')">-</button>

<button onclick="masukkanAngka('7')">7</button>
<button onclick="masukkanAngka('8')">8</button>
<button onclick="masukkanAngka('9')">9</button>
<button class="operator" onclick="masukkanAngka('+')">+</button>

<button onclick="masukkanAngka('4')">4</button>
<button onclick="masukkanAngka('5')">5</button>
<button onclick="masukkanAngka('6')">6</button>
<button onclick="masukkanAngka('.')">.</button>

<button onclick="masukkanAngka('0')">0</button>
<button onclick="masukkanAngka('1')">1</button>
<button onclick="masukkanAngka('2')">2</button>
<button onclick="masukkanAngka('3')">3</button>

<button class="sama-dengan" onclick="hitungHasil()">=</button>
</div>
</div>

<script>

const layar = document.getElementById("layar");

function masukkanAngka(angka){
    if(layar.value === "Error") {
        layar.value = "";
    }
    layar.value += angka;
}

function hapusLayar(){
    layar.value = "";
}

function hitungHasil(){
    try{
        layar.value = eval(layar.value);
    }catch{
        layar.value = "Error";
    }
}

</script>

</body>
</html>
